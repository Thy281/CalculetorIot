
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Groq AI API
groq.api.key=${GROQ_API_KEY:}

# ========================
# Rate Limiting Configuration
# ========================
ratelimit.enabled=true
ratelimit.max-requests=100
ratelimit.period-minutes=1
ratelimit.identifier-type=ip
# Paths excluded from rate limiting (comma-separated)
ratelimit.excluded-paths=/actuator/**,/error

# Endpoint-specific limits (optional)
# ratelimit.endpoints[0].path=/api/calculate
# ratelimit.endpoints[0].max-requests=200
# ratelimit.endpoints[0].period-minutes=5

# ========================
# Redis Configuration (optional - for distributed rate limiting)
# ========================
# If Redis is available, it will be used automatically for rate limiting
# Otherwise, falls back to in-memory (Caffeine)
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
# spring.redis.password=${SPRING_REDIS_PASSWORD:}
# spring.redis.timeout=2000ms
